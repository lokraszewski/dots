- name: Gather facts
  ansible.builtin.setup:

- name: Resolve packages
  include_role:
    name: common
    tasks_from: resolve_packages
  tags:
    - packages
    - git

- name: Include OS installer
  include_tasks: "install/{{ ansible_platform }}.yml"
  vars:
    ansible_platform: "{{ 'darwin' if ansible_facts['system'] == 'Darwin' else ansible_facts['distribution'] | lower }}"
  tags:
    - packages
    - git

- name: Validate git identity
  ansible.builtin.assert:
    that:
      - git_identity_effective.name is defined
      - git_identity_effective.email is defined
      - git_identity_effective.name | length > 0
      - git_identity_effective.email | length > 0
    fail_msg: "git identity for this host must be set in secrets/secrets.yml under git_identities.<inventory_hostname>."
  vars:
    git_identity_effective: "{{ git_identities.get(inventory_hostname, {}) }}"

- name: Configure git identity
  community.general.git_config:
    name: user.name
    value: "{{ git_identity_effective.name }}"
    scope: global
  vars:
    git_identity_effective: "{{ git_identities.get(inventory_hostname, {}) }}"

- name: Configure git email
  community.general.git_config:
    name: user.email
    value: "{{ git_identity_effective.email }}"
    scope: global
  vars:
    git_identity_effective: "{{ git_identities.get(inventory_hostname, {}) }}"

