# Terminal — truecolor + nerd font glyph support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-features ",*:RGB"
set -gq allow-passthrough on

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_plugins "group(cpu,memory,loadavg),group(git,github),group(kubernetes,cloud),battery,group(hostname,externalip,ssh),bw"

set -g @powerkit_theme "catppuccin"
set -g @powerkit_theme_variant "frappe"
set -g @powerkit_transparent "false"

# Choose your separator style
set -g @powerkit_separator_style "rounded"

# Customize update interval
set -g @powerkit_status_interval "5"


# F12 toggles passthrough to nested remote session.
# Writing @powerkit_localremote_mode directly because #{client_key_table}
# has no client context inside powerkit's background render subprocess.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  refresh-client -S

# =============================================================================
# Default keybindings reference  (prefix = C-a)
# =============================================================================
#
# Sessions
#   C-a s          — list/switch sessions (interactive tree)
#   C-a $          — rename current session
#   C-a d          — detach from session
#   C-a (          — switch to previous session
#   C-a )          — switch to next session
#
# Windows (tabs)
#   C-a c          — create new window
#   C-a ,          — rename current window
#   C-a &          — kill current window (with confirm)
#   C-a n          — next window
#   C-a p          — previous window
#   C-a l          — last (most recently used) window
#   C-a 0-9        — switch to window by number
#   C-a w          — list/switch windows (interactive tree)
#
# Panes (splits)
#   C-a %          — split vertically (left/right)
#   C-a "          — split horizontally (top/bottom)
#   C-a x          — kill current pane (with confirm)
#   C-a z          — toggle pane zoom (fullscreen)
#   C-a arrow      — move focus to pane in direction
#   C-a C-arrow    — resize pane in direction (hold Ctrl, tap arrow)
#   C-a {          — swap pane with the one above
#   C-a }          — swap pane with the one below
#   C-a q          — show pane numbers (press number to jump)
#   C-a !          — break pane out into its own window
#   C-a o          — cycle focus through panes
#
# Copy mode
#   C-a [          — enter copy mode (navigate with vi/emacs keys)
#   C-a ]          — paste most recent buffer
#   C-a =          — list all paste buffers and choose one
#   q              — quit copy mode
#   Space          — start selection (vi mode)
#   Enter          — copy selection and exit copy mode
#
# Misc
#   C-a ?          — list all keybindings
#   C-a :          — open command prompt
#   C-a t          — show clock
#   C-a i          — show info about current window
#   C-a r          — (custom, add if needed) reload config
#
# Plugins (TPM)
#   C-a I          — install plugins listed in this file
#   C-a U          — update installed plugins
#   C-a M-u        — remove plugins no longer listed
#
# Nested session (F12 toggle)
#   F12            — disable local prefix, pass keys through to remote tmux
#   F12 (again)    — re-enable local prefix
# =============================================================================

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'


