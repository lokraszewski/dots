# Terminal — truecolor + nerd font glyph support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-features ",*:RGB"
set -gq allow-passthrough on

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_plugins "group(cpu,memory,loadavg),group(git,github),group(kubernetes,cloud),battery,group(hostname,externalip,ssh),bw"

set -g @powerkit_theme "catppuccin"
set -g @powerkit_theme_variant "frappe"
set -g @powerkit_transparent "false"

# Choose your separator style
set -g @powerkit_separator_style "rounded"

# Customize update interval
set -g @powerkit_status_interval "5"


# F12 toggles passthrough to nested remote session.
# Writing @powerkit_localremote_mode directly because #{client_key_table}
# has no client context inside powerkit's background render subprocess.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  refresh-client -S

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'


