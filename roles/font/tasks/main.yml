- name: Gather facts
  ansible.builtin.setup:

- name: Install packages
  include_role:
    name: common
    tasks_from: install
  tags:
    - packages
    - fonts

- name: Write terminal font recommendation
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.terminal-font"
    content: |
      {{ terminal_font_name }}
      Recommended for:
      - Fish shell
      - tmux
      - starship prompt
  tags:
    - fonts

