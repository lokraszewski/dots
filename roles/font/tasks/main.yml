- name: Gather facts
  ansible.builtin.setup:

- name: Resolve packages
  include_role:
    name: common
    tasks_from: resolve_packages
  tags:
    - packages
    - fonts

- name: Include OS installer
  include_tasks: "install/{{ ansible_platform }}.yml"
  vars:
    ansible_platform: "{{ 'darwin' if ansible_facts['system'] == 'Darwin' else ansible_facts['distribution'] | lower }}"
  tags:
    - packages
    - fonts

- name: Write terminal font recommendation
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.terminal-font"
    content: |
      {{ terminal_font_name }}
      Recommended for:
      - Fish shell
      - tmux
      - starship prompt
  tags:
    - fonts

